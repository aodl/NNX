[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
  "RUSTSEC-2024-0436", # paste is pulled transitively by candid; no safe upstream replacement here.
  "RUSTSEC-2021-0127", # serde_cbor is pulled transitively by ic-http-certification.
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
]
exceptions = [
  { allow = ["Apache-2.0 WITH LLVM-exception"], crate = "ar_archive_writer" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
