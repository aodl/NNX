name: Browser Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '24 3 * * 1'

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-fund --no-audit
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
